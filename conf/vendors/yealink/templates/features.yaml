      type: string
      config_template: "{% if expansion_module > 0 %}expansion_module.{{expansion_module}}.key.{{key_index}}.label = {{value}}{% else %}linekey.{{key_index}}.label = {{value}}{% endif %}"
    - id: value
      label: Value
      type: string
      config_template: "{% if expansion_module > 0 %}expansion_module.{{expansion_module}}.key.{{key_index}}.value = {{value}}{% else %}linekey.{{key_index}}.value = {{value}}{% endif %}"

- id: pc_port
  name: PC Port
  params:
    - id: enabled
      label: Enabled
      type: boolean
      config_template: "network.pc_port.enable = {% if value %}1{% else %}0{% endif %}"


      