- id: blf
  name: BLF
  associated_with_button: true
  params:
    - id: type
      label: Type
      type: hidden
      value: 16
      config_template: "{% if expansion_module > 0 %}expansion_module.{{expansion_module}}.key.{{key_index}}.type = {{value}}{% else %}linekey.{{key_index}}.type = {{value}}{% endif %}"
    - id: line_association
      type: hidden
      value: "1" # Значение заглушка, чтобы сработал рендеринг шаблона
      config_template: "{% if expansion_module > 0 %}expansion_module.{{expansion_module}}.key.{{key_index}}.line = {{account.number}}{% else %}linekey.{{key_index}}.line = {{account.number}}{% endif %}"
    - id: ringtype
      label: Ring Type
      type: select
      options:
        - value: "Silent.wav"
          label: "Silent"
        - value: "Ring1.wav"
          label: "Ring 1"
        - value: "Ring2.wav"
          label: "Ring 2"
        - value: "Ring3.wav"
          label: "Ring 3"
        - value: "Ring4.wav"
          label: "Ring 4"
        - value: "Ring5.wav"
          label: "Ring 5"
        - value: "Ring6.wav"
          label: "Ring 6"
        - value: "Ring7.wav"
          label: "Ring 7"
        - value: "Ring8.wav"
          label: "Ring 8"        
        - value: "Splash.wav"
          label: "Splash"
      config_template: "{% if expansion_module > 0 %}expansion_module.{{expansion_module}}.key.{{key_index}}.ring_type = {{value}}{% else %}linekey.{{key_index}}.ring_type = {{value}}{% endif %}"
    - id: label
      label: Label
      type: string
      config_template: "{% if expansion_module > 0 %}expansion_module.{{expansion_module}}.key.{{key_index}}.label = {{value}}{% else %}linekey.{{key_index}}.label = {{value}}{% endif %}"
    - id: value
      label: Value
      type: string
      config_template: "{% if expansion_module > 0 %}expansion_module.{{expansion_module}}.key.{{key_index}}.value = {{value}}{% else %}linekey.{{key_index}}.value = {{value}}{% endif %}"

- id: sd
  name: Speed Dial
  associated_with_button: true
  params:
    - id: type
      label: Type
      type: hidden
      value: 13
      config_template: "{% if expansion_module > 0 %}expansion_module.{{expansion_module}}.key.{{key_index}}.type = {{value}}{% else %}linekey.{{key_index}}.type = {{value}}{% endif %}"
    - id: line
